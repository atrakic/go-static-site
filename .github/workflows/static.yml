# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # every-day-6am

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Checkout tools repo
        uses: actions/checkout@v6
        with:
          repository: atrakic/static-generator
          path: generator
      - name: Set up uv
        uses: astral-sh/setup-uv@v2

      - name: Build site
        run: |
          rm -rf _site
          cd generator
          uv sync
          for ((i=1;i<=10;i++)); do
            uv run ../scripts/genposts.py > "content/blog/$(date -I)-$i.md"
          done
          uv run makesite.py build --config ../config.json --site-dir ../_site

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A _site
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
            exit 0
          fi
          git commit -m "chore: update generated site for ${GITHUB_SHA}"
          git push origin HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
